<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1> Welcome to my Weather App!</h1>
        <form class="search-engine">
            <input type="text" placeholder="Enter city name" class="search-input" >
            <input type="submit" value=" Search"  class="search-button" >
        </form>
        <div class="weather-info">
            <div class="weather-details">
                <h2 id="city">Johannesburg</h2>
                
                <p id="date-time">Wednesday,20 July 2026, 11:04</p>
        
                <div class="temp">
                    <img id="weather-icon" src="" alt="Weather Icon">
                    <span class="temperature"></span><span class="degree">°C</span>
                </div>
        
                <p id="description">Cloudy</p>
        
                <div class="stats">
                    <p>💧 Humidity: <span id="humidity"></span>%</p>
                    <p>🌬 Wind: <span id="wind-speed"></span> km/h</p>
                </div>
            </div>
        </div>

        <footer>
            Weather App Project &copy; 2024 by <a href="https://github.com/Nhlanhla-star-hue">Nhlanhla Karen Ndlovu</a>. All rights reserved.  
        </footer>
    </div>
    <script src="index.js"></script>
</body>
</html>
